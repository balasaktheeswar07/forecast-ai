version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: forecast-ai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: forecast-ai-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./data:/app/data
    working_dir: /app
    command: python run_backend.py
    networks:
      - forecast-ai-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: forecast-ai-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0
    networks:
      - forecast-ai-network

volumes:
  ollama_data:

networks:
  forecast-ai-network:
    driver: bridge
